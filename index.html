<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonia’s Synapse & Sips Passport</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="mobile-container">
        <header>
            <img src="cafe.png" alt="Cafe Icon" class="header-icon float-anim">
            <h1>Sonia’s Synapse & Sips</h1>
            <p class="subtitle">Ontario Brain Institute Internship 2026</p>
        </header>

        <main id="app-form">
            <section class="card drink-toggle">
                <div class="toggle-group">
                    <label class="toggle-item">
                        <input type="radio" name="drinkType" value="coffee" checked>
                        <div class="toggle-box">
                            <img src="coffee-glass.png" alt="Coffee">
                            <span>Coffee</span>
                        </div>
                    </label>
                    <label class="toggle-item">
                        <input type="radio" name="drinkType" value="matcha">
                        <div class="toggle-box">
                            <img src="matcha-glass.png" alt="Matcha">
                            <span>Matcha</span>
                        </div>
                    </label>
                </div>
            </section>

            <section class="card">
                <input type="text" id="drinkName" placeholder="What are we sipping?" class="input-field">
                <div class="standard-adj">
                    <span>Standard</span>
                    <label class="switch">
                        <input type="checkbox" id="isAdjusted">
                        <span class="slider-toggle round"></span>
                    </label>
                    <span>Adjusted</span>
                </div>
            </section>

            <section class="card sweetness-selector">
                <h3>Sweetness Level</h3>
                <div class="cube-row" id="sugarCubes">
                    <img src="empty-cube.png" data-value="1" class="cube">
                    <img src="empty-cube.png" data-value="2" class="cube">
                    <img src="empty-cube.png" data-value="3" class="cube">
                    <img src="empty-cube.png" data-value="4" class="cube">
                    <img src="empty-cube.png" data-value="5" class="cube">
                </div>
            </section>

            <section class="card slider-card">
                <div class="slider-header">
                    <img src="bitter.png" class="end-icon" alt="Bitter">
                    <h3>Bitterness</h3>
                    <img src="sweet.png" class="end-icon" alt="Sweet">
                </div>
                <input type="range" min="1" max="100" value="50" class="styled-slider" id="bitterSlider">
                
                <div class="slider-header mt-20">
                    <img src="empty-glass.png" class="end-icon" alt="Thin">
                    <h3>Smoothness</h3>
                    <img src="drinking.png" class="end-icon" alt="Smooth">
                </div>
                <input type="range" min="1" max="100" value="50" class="styled-slider" id="smoothSlider">
            </section>

            <section class="card">
                <h3>Overall Synapse Score</h3>
                <input type="range" min="1" max="5" step="0.5" value="3" class="styled-slider rating-slider" id="overallRating">
                <div class="rating-display"><span id="ratingValue">3.0</span> / 5</div>
            </section>

            <section class="card again-card">
                <button id="againBtn" class="again-toggle">
                    <img src="again.png" alt="Again?">
                    <span>Would I get it again?</span>
                </button>
            </section>

            <button class="submit-btn" id="saveEntry">Log Entry</button>
        </main>

        <img src="matcha-sitting.png" class="buddy-icon left-buddy">
        <img src="matcha-bowl.png" class="buddy-icon right-buddy">
    </div>

    <script src="script.js"></script>
</body>
</html>
