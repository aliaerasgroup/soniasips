<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonia’s Synapse & Sips Passport</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Questrial&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-wrapper">
        <div id="main-page">
            <header>
                <img src="cafe.png" alt="Cafe" class="header-icon-static">
                <h1>Sonia’s Synapse & Sips Passport</h1>
                <p class="obi-tag">Ontario Brain Institute Internship 2026 • Toronto</p>
            </header>

            <main>
                <section class="card">
                    <h2 class="section-title">What's in the cup?</h2>
                    <div class="cup-toggle">
                        <label class="cup-option">
                            <input type="radio" name="baseType" value="coffee" checked>
                            <div class="cup-card">
                                <img src="coffee-glass.png" alt="Coffee">
                                <span>Coffee</span>
                            </div>
                        </label>
                        <label class="cup-option">
                            <input type="radio" name="baseType" value="matcha">
                            <div class="cup-card">
                                <img src="matcha-glass.png" alt="Matcha">
                                <span>Matcha</span>
                            </div>
                        </label>
                    </div>
                </section>

                <section class="card">
                    <h2 class="section-title">Sip Details</h2>
                    <div class="input-group">
                        <label>Cafe Name</label>
                        <input type="text" id="cafeName" placeholder="RoastAroma Specialty Cafe">
                    </div>
                    <div class="input-group">
                        <label>Drink Order</label>
                        <input type="text" id="drinkName" placeholder="oat milk matcha latte">
                    </div>
                    <div class="input-group">
                        <label>Date</label>
                        <input type="date" id="sipDate">
                    </div>
                </section>

                <section class="card">
                    <h2 class="section-title">General Thoughts</h2>
                    <div class="textarea-container">
                        <textarea id="generalComments" placeholder="My thoughts, who I went with, etc."></textarea>
                    </div>
                </section>

                <section class="card">
                    <h2 class="section-title">Taste Spectrum</h2>
                    <div class="slider-container">
                        <div class="slider-labels">
                            <img src="bitter.png" alt="Bitter" class="end-icon">
                            <h3>Bitter to Smooth</h3>
                            <img src="sweet.png" alt="Smooth" class="end-icon">
                        </div>
                        <input type="range" min="1" max="10" value="5" class="kawaii-slider" id="tasteSlider">
                        <div class="osd-value-center" id="tasteVal">5</div>
                    </div>
                </section>

                <section class="card">
                    <h2 class="section-title">Sweetness Level</h2>
                    <div class="sugar-row" id="sugarContainer"></div>
                    <div id="sweetComment" class="comment-popup-osd">PICK A CUBE!</div>
                </section>

                <section class="card">
                    <div class="standard-row">
                        <span>Standard</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="adjCheck">
                            <span class="toggle-slider"></span>
                        </label>
                        <span>Adjusted</span>
                    </div>
                    <div id="adjNotes" class="hidden-notes">
                        <textarea id="adjInput" placeholder="What changes were made?"></textarea>
                    </div>
                </section>

                <section class="card">
                    <h2 class="section-title">Would I go again?</h2>
                    <div class="return-grid">
                        <label class="return-btn">
                            <input type="radio" name="returnChoice" value="Absolutely!" checked>
                            <div class="return-content">
                                <img src="again.png">
                                <span>Absolutely!</span>
                            </div>
                        </label>
                        <label class="return-btn">
                            <input type="radio" name="returnChoice" value="Maybe...">
                            <div class="return-content">
                                <img src="matcha-sitting.png">
                                <span>Maybe...</span>
                            </div>
                        </label>
                        <label class="return-btn">
                            <input type="radio" name="returnChoice" value="Probably not">
                            <div class="return-content">
                                <img src="probably not.png">
                                <span>Probably not</span>
                            </div>
                        </label>
                        <label class="return-btn">
                            <input type="radio" name="returnChoice" value="Not again">
                            <div class="return-content">
                                <img src="drinking.png">
                                <span>Not again</span>
                            </div>
                        </label>
                    </div>
                </section>

                <section class="card">
                    <h2 class="section-title">Overall Score</h2>
                    <div class="slider-container">
                        <input type="range" min="1" max="5" step="0.5" value="3.0" class="kawaii-slider" id="scoreSlider">
                        <div class="osd-value-center score-large" id="scoreVal">3.0</div>
                    </div>
                </section>

                <button class="stamp-btn" id="submitBtn">Stamp my passport!</button>
                <button class="view-link-btn" id="viewPassport">View my past entries</button>
            </main>
        </div>

        <div id="history-page" class="hidden-view">
            <header>
                <h1 class="history-title">Passport History</h1>
                <p class="obi-tag">Sonia's Brainy Brews</p>
                <button id="exportEmail" class="action-btn">📧 Export to Email</button>
            </header>
            <div id="history-list"></div>
            <button class="stamp-btn back-btn" id="backToForm">Add New Entry</button>
        </div>
        
        <img src="matcha-bowl.png" class="bg-buddy bowl-static">
        <img src="matcha-sitting.png" class="bg-buddy sitter-float">
    </div>

    <script src="script.js"></script>
</body>
</html>
